<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Looping Rooms</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #87CEEB;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        canvas {
            display: block;
            background-color: #90EE90;
        }

        #instructions {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: rgba(255, 255, 255, 0.8);
            padding: 10px;
            border-radius: 5px;
            z-index: 10;
        }
    </style>
</head>

<body>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // PLAYER
        const player = {
            x: 100,
            y: canvas.height - 200,
            prevY: canvas.height - 200,
            width: 50,
            height: 50,
            velocityX: 0,
            velocityY: 0,
            isJumping: false,
            isCrouching: false,
            speed: 2.5,
            jumpPower: -8,
            gravity: 0.2,
            groundY: canvas.height - 150
        };

        // CAMERA
        const camera = {
            x: player.x,
            y: player.y,
            zoom: 1.5
        };

        // PLATFORMS
        const platforms = [
            { x: 300, y: canvas.height - 300, width: 200, height: 20 },
            { x: 600, y: canvas.height - 400, width: 150, height: 20 },
            { x: 900, y: canvas.height - 250, width: 180, height: 20 },
            { x: 1200, y: canvas.height - 350, width: 120, height: 20 },
            { x: 1500, y: canvas.height - 400, width: 150, height: 251 }
        ];

        const walls = [
            { x: 0, y: 0, width: 3000, height: 20 },
            { x: 0, y: 0, width: 20, height: canvas.height },
            { x: 2980, y: 0, width: 20, height: canvas.height }
        ];

        const door = [
            { x: 2800, y: canvas.height - 200, width: 50, height: 50 }
        ];

        // RESIZE
        window.addEventListener('resize', () => {
            const oldHeight = canvas.height;
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const heightDiff = canvas.height - oldHeight;
            player.groundY = canvas.height - 150;

            platforms.forEach(p => p.y += heightDiff);

            if (player.y > player.groundY - player.height) {
                player.y = player.groundY - player.height;
            }
            player.prevY = player.y;
        });

        // INPUT
        const keys = {};

        document.addEventListener('keydown', e => keys[e.code] = true);
        document.addEventListener('keyup', e => keys[e.code] = false);

        // ZOOM
        document.addEventListener("wheel", (e) => {
            camera.zoom += e.deltaY * -0.001;
            camera.zoom = Math.max(0.5, Math.min(3, camera.zoom));
        });

        // COLLISION
        function checkPlatformCollision() {
            for (let p of platforms) {
                if (player.x < p.x + p.width &&
                    player.x + player.width > p.x &&
                    player.y < p.y + p.height &&
                    player.y + player.height > p.y) {

                    if (player.prevY + player.height <= p.y) {
                        player.y = p.y - player.height;
                        player.velocityY = 0;
                        player.isJumping = false;
                        return true;
                    } else if (player.prevY >= p.y + p.height) {
                        player.y = p.y + p.height;
                        player.velocityY = 0;
                        return true;
                    } else {
                        if (player.velocityX > 0 && player.x < p.x) {
                            player.x = p.x - player.width;
                        } else if (player.velocityX < 0 && player.x > p.x) {
                            player.x = p.x + p.width;
                        }
                    }
                }
            }
            return false;
        }
        function checkWallCollision() {
            for (let w of walls) {
                if (player.x < w.x + w.width &&
                    player.x + player.width > w.x &&
                    player.y < w.y + w.height &&
                    player.y + player.height > w.y) {

                    if (player.prevY + player.height <= w.y) {
                        player.y = w.y - player.height;
                        player.velocityY = 0;
                        player.isJumping = false;
                        return true;
                    } else if (player.prevY >= w.y + w.height) {
                        player.y = w.y + w.height;
                        player.velocityY = 0;
                        return true;
                    } else {
                        if (player.velocityX > 0 && player.x < w.x) {
                            player.x = w.x - player.width;
                        } else if (player.velocityX < 0 && player.x > w.x) {
                            player.x = w.x + w.width;
                        }
                    }
                }
            }
            return false;
        }

        // PLAYER UPDATE
        function updatePlayer() {
            if (keys['KeyA'] || keys['ArrowLeft']) player.velocityX = -player.speed;
            else if (keys['KeyD'] || keys['ArrowRight']) player.velocityX = player.speed;
            else player.velocityX = 0;

            if (keys['KeyS'] || keys['ArrowDown']) {
                player.isCrouching = true;
                player.height = 25;
                player.y = player.groundY - player.height;
            } else {
                player.isCrouching = false;
                player.height = 50;
            }

            if ((keys['Space'] || keys['KeyW'] || keys['ArrowUp']) && !player.isJumping && !player.isCrouching) {
                player.velocityY = player.jumpPower;
                player.isJumping = true;
            }

            player.velocityY += player.gravity;
            player.prevY = player.y;

            player.x += player.velocityX;
            player.y += player.velocityY;

            checkWallCollision();
            if (!checkPlatformCollision()) {
                if (player.y >= player.groundY - player.height) {
                    player.y = player.groundY - player.height;
                    player.velocityY = 0;
                    player.isJumping = false;
                }
            }

        }

        // CAMERA UPDATE
        function updateCamera() {
            const lerp = 0.1;

            camera.x += (player.x + player.width / 2 - camera.x) * lerp;
            camera.y += (player.y + player.height / 2 - camera.y) * lerp;
        }

        // DRAW
        function drawPlayer() {
            ctx.fillStyle = 'red';
            ctx.fillRect(player.x, player.y, player.width, player.height);
        }

        function drawEnvironment() {
            ctx.fillStyle = '#818589';
            ctx.fillRect(0, player.groundY, 3000, canvas.height);

            ctx.fillStyle = '#654321';
            platforms.forEach(p => {
                ctx.fillRect(p.x, p.y, p.width, p.height);
            });
            
            ctx.fillStyle = '#36454F';
            walls.forEach(w => {
                ctx.fillRect(w.x, w.y, w.width, w.height);
            });

            ctx.fillStyle = '#FFD700';
            door.forEach(d => {
                ctx.fillRect(d.x, d.y, d.width, d.height);
            });


        }

        // GAME LOOP
        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            updatePlayer();
            updateCamera();

            // APPLY CAMERA
            ctx.setTransform(
                camera.zoom, 0,
                0, camera.zoom,
                canvas.width / 2 - camera.x * camera.zoom,
                canvas.height / 2 - camera.y * camera.zoom
            );

            drawEnvironment();
            drawPlayer();

            // RESET
            ctx.setTransform(1, 0, 0, 1, 0, 0);

            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>

</html>
