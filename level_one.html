<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Looping Rooms</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #87CEEB;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        canvas {
            display: block;
            background-color: #90EE90;
        }
        #instructions {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: rgba(255, 255, 255, 0.8);
            padding: 10px;
            border-radius: 5px;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="instructions">
        <strong>Controls:</strong><br>
        Move: A/D or Left/Right Arrow<br>
        Jump: Space, W, or Up Arrow<br>
        Crouch: S or Down Arrow
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Set canvas to full screen
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Player object
        const player = {
            x: 100,
            y: canvas.height - 200,
            prevY: canvas.height - 200,
            width: 50,
            height: 50,
            velocityX: 0,
            velocityY: 0,
            isJumping: false,
            isCrouching: false,
            speed: 3,
            jumpPower: -12,
            gravity: 0.4,
            groundY: canvas.height - 150
        };

        // Platforms
        const platforms = [
            { x: 300, y: canvas.height - 300, width: 200, height: 20 },
            { x: 600, y: canvas.height - 400, width: 150, height: 20 },
            { x: 900, y: canvas.height - 250, width: 180, height: 20 },
            { x: 1200, y: canvas.height - 350, width: 120, height: 20 }
        ];

        // Handle window resize
        window.addEventListener('resize', () => {
            const oldHeight = canvas.height;
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const heightDiff = canvas.height - oldHeight;
            player.groundY = canvas.height - 150;
            // Adjust platform positions
            platforms.forEach(platform => {
                platform.y += heightDiff;
            });
            if (player.y > player.groundY - player.height) {
                player.y = player.groundY - player.height;
            }
            player.prevY = player.y;
        });

        // Keys pressed
        const keys = {};

        // Check platform collision
        function checkPlatformCollision() {
            for (let platform of platforms) {
                if (player.x < platform.x + platform.width &&
                    player.x + player.width > platform.x &&
                    player.y < platform.y + platform.height &&
                    player.y + player.height > platform.y) {
                    // Collision detected - make platforms solid
                    if (player.prevY + player.height <= platform.y) {
                        // Coming from above - land on platform
                        player.y = platform.y - player.height;
                        player.velocityY = 0;
                        player.isJumping = false;
                        return true;
                    } else if (player.prevY >= platform.y + platform.height) {
                        // Coming from below - hit platform from underneath
                        player.y = platform.y + platform.height;
                        player.velocityY = 0;
                        return true;
                    } else {
                        // Side collision - prevent horizontal movement through platform
                        if (player.velocityX > 0 && player.x < platform.x) {
                            player.x = platform.x - player.width;
                        } else if (player.velocityX < 0 && player.x > platform.x) {
                            player.x = platform.x + platform.width;
                        }
                    }
                }
            }
            return false;
        }

        // Event listeners
        document.addEventListener('keydown', (e) => {
            keys[e.code] = true;
        });

        document.addEventListener('keyup', (e) => {
            keys[e.code] = false;
        });

        // Update player
        function updatePlayer() {
            // Horizontal movement
            if (keys['KeyA'] || keys['ArrowLeft']) {
                player.velocityX = -player.speed;
            } else if (keys['KeyD'] || keys['ArrowRight']) {
                player.velocityX = player.speed;
            } else {
                player.velocityX = 0;
            }

            // Crouching
            if (keys['KeyS'] || keys['ArrowDown']) {
                player.isCrouching = true;
                player.height = 25;
                player.y = player.groundY - player.height;
            } else {
                player.isCrouching = false;
                player.height = 50;
            }

            // Jumping
            if ((keys['Space'] || keys['KeyW'] || keys['ArrowUp']) && !player.isJumping && !player.isCrouching) {
                player.velocityY = player.jumpPower;
                player.isJumping = true;
            }

            // Apply gravity
            player.velocityY += player.gravity;

            // Store previous position
            player.prevY = player.y;

            // Update position
            player.x += player.velocityX;
            player.y += player.velocityY;

            // Platform collision
            if (!checkPlatformCollision()) {
                // Ground collision
                if (player.y >= player.groundY - player.height) {
                    player.y = player.groundY - player.height;
                    player.velocityY = 0;
                    player.isJumping = false;
                }
            }

            // Keep player in bounds
            if (player.x < 0) player.x = 0;
            if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;
        }

        // Draw player
        function drawPlayer() {
            ctx.fillStyle = '#FF0000';
            ctx.fillRect(player.x, player.y, player.width, player.height);
        }

        // Draw environment
        function drawEnvironment() {
            // Draw ground
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(0, player.groundY, canvas.width, canvas.height - player.groundY);

            // Draw platforms
            ctx.fillStyle = '#654321';
            platforms.forEach(platform => {
                ctx.fillRect(platform.x, platform.y, platform.width, platform.height);
            });
        }

        // Game loop
        function gameLoop() {
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Update
            updatePlayer();

            // Draw
            drawEnvironment();
            drawPlayer();

            // Request next frame
            requestAnimationFrame(gameLoop);
        }

        // Start game
        gameLoop();
    </script>
</body>
</html>
